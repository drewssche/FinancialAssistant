<section class="kpi-grid">
  <article class="card kpi">
    <p>Доход</p>
    <h3 id="kpi-income">{{ '%.2f'|format(summary.totals.income) }}</h3>
  </article>
  <article class="card kpi">
    <p>Расход</p>
    <h3 id="kpi-expense">{{ '%.2f'|format(summary.totals.expense) }}</h3>
  </article>
  <article class="card kpi balance">
    <p>Баланс</p>
    <h3 id="kpi-balance">{{ '%.2f'|format(summary.totals.balance) }}</h3>
  </article>
</section>
