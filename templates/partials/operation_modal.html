<div class="modal" id="tx-modal" aria-hidden="true">
  <div class="modal-shell">
    <div class="modal-dialog">
      <div class="modal-head">
        <h2 id="modal-title">Новая операция</h2>
        <button id="close-modal" class="btn btn--ghost" type="button">Закрыть</button>
      </div>
      <div class="tx-preview" id="tx-preview">
        <div class="tx-preview-head">Предпросмотр операции</div>
        <div class="tx-preview-row">
          <span id="preview-kind"></span>
          <span id="preview-subcategory"></span>
          <span id="preview-amount">0.00</span>
          <span id="preview-account"></span>
          <span id="preview-date">{{ today }}</span>
        </div>
        <div class="tx-preview-note" id="preview-comment" hidden></div>
      </div>

      <form id="tx-form" class="modal-form">
        <div class="field">
          <label>Общая категория</label>
          <div class="pill-switch" id="kind-switch">
            <button type="button" data-kind="expense" class="btn btn--toggle active">
              <span class="toggle-icon">↘</span>
              <span>Расход</span>
            </button>
            <button type="button" data-kind="income" class="btn btn--toggle">
              <span class="toggle-icon">↗</span>
              <span>Доход</span>
            </button>
          </div>
          <input type="hidden" name="kind" id="kind" value="expense" />
        </div>

        <div class="field">
          <div class="field-head">
            <label for="subcategory-search">Подкатегория</label>
            <button id="open-category-manager" class="btn btn--secondary" type="button">Управление</button>
          </div>
          <input id="subcategory-search" type="text" placeholder="поиск категории" autocomplete="off" />

          <button id="create-category-btn" class="btn btn--chip create-category-chip" type="button" hidden></button>

          <div class="chips-row" id="subcategory-quick"></div>

          <div id="subcategory-popover" class="popover" hidden>
            <div class="popover-head">Другие категории</div>
            <div id="subcategory-all" class="chips popover-chips"></div>
          </div>

          <input type="hidden" id="subcategory" name="subcategory" required />
        </div>

        <div class="field">
          <label for="amount">Сумма</label>
          <input id="amount" name="amount" type="number" step="0.01" min="0.01" required />
        </div>

        <div class="field date-field">
          <label>Дата</label>
          <div class="date-current-chip" id="occurred_on_text">{{ today }}</div>
          <input id="occurred_on" name="occurred_on" type="hidden" value="{{ today }}" required />
          <div class="date-strip" id="date-strip"></div>
        </div>

        <div class="field">
          <label>Счет</label>
          <div id="account-chips" class="account-pills">
            {% for account in accounts %}
              <button
                type="button"
                class="btn btn--chip account-chip"
                data-account="{{ account }}"
                aria-label="{{ account }}"
              >
                {% if account == "Карта" %}
                  <svg class="account-chip-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3.5" y="6" width="17" height="12" rx="2.5" ry="2.5" fill="none" stroke="currentColor" stroke-width="1.8"></rect>
                    <line x1="4.5" y1="10" x2="19.5" y2="10" stroke="currentColor" stroke-width="1.8"></line>
                  </svg>
                {% else %}
                  <svg class="account-chip-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="7.2" fill="none" stroke="currentColor" stroke-width="1.8"></circle>
                    <line x1="12" y1="8.3" x2="12" y2="15.7" stroke="currentColor" stroke-width="1.8"></line>
                    <line x1="9.3" y1="10.2" x2="14.6" y2="10.2" stroke="currentColor" stroke-width="1.8"></line>
                    <line x1="9.3" y1="13.8" x2="14.6" y2="13.8" stroke="currentColor" stroke-width="1.8"></line>
                  </svg>
                {% endif %}
                <span class="account-chip-text">{{ account }}</span>
              </button>
            {% endfor %}
          </div>
          <input type="hidden" id="account" name="account" required />
        </div>

        <div class="field">
          <label for="comment">Комментарий</label>
          <input id="comment" name="comment" type="text" placeholder="необязательно" />
        </div>

        <div class="form-actions">
          <button id="save-btn" class="btn btn--primary" type="submit">Сохранить</button>
          <button id="delete-btn" class="btn btn--danger" type="button" hidden>Удалить</button>
        </div>
      </form>
    </div>

    <aside id="category-manager-panel" class="manager-panel" hidden>
      <div class="manager-head">
        <span>Управление категориями</span>
        <div class="manager-head-actions">
          <button id="add-category-group" type="button" class="btn btn--secondary">+ Группа</button>
          <button id="close-category-manager" type="button" class="btn btn--ghost">Закрыть</button>
        </div>
      </div>
      <div class="category-groups" id="category-groups"></div>
      <section id="manager-editor" class="manager-editor" hidden>
        <div class="manager-editor-head">
          <strong id="manager-editor-title">Редактирование</strong>
          <button id="manager-editor-close" type="button" class="btn btn--ghost">Закрыть</button>
        </div>
        <div class="manager-editor-body">
          <label for="editor-name">Название</label>
          <input id="editor-name" type="text" />
          <div id="editor-color-wrap" hidden>
            <label for="editor-color">Цвет</label>
            <input id="editor-color" type="color" value="#7aa7ff" />
          </div>
          <div id="editor-icon-wrap" hidden>
            <label>Иконка группы</label>
            <div id="editor-icon-grid" class="icon-grid"></div>
          </div>
          <div id="editor-move-wrap" hidden>
            <label for="editor-group-select">Группа</label>
            <select id="editor-group-select"></select>
          </div>
        </div>
        <div class="manager-editor-actions">
          <button id="editor-archive" type="button" class="btn btn--secondary">Архивировать</button>
          <button id="editor-save" type="button" class="btn btn--primary">Сохранить</button>
          <button id="editor-delete" type="button" class="btn btn--danger">Удалить</button>
        </div>
      </section>
    </aside>
  </div>
</div>
