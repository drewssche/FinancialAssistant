services:
  app:
    build: .
    container_name: financial_assistant_app
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.50
    stop_grace_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    command: sh -lc "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"

  bot:
    build: .
    container_name: financial_assistant_bot
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      app:
        condition: service_started
    mem_limit: 192m
    cpus: 0.15
    stop_grace_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    command: python scripts/run_telegram_admin_bot.py

  db:
    image: postgres:16-alpine
    container_name: financial_assistant_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
      -c shared_buffers=64MB
      -c work_mem=2MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=256MB
      -c max_connections=20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    cpus: 0.35
    shm_size: 64m
    stop_grace_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financial_assistant_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    mem_limit: 128m
    cpus: 0.10
    stop_grace_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
