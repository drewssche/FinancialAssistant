services:
  db:
    image: postgres:16-alpine
    container_name: financial_db
    environment:
      POSTGRES_DB: ${DB_NAME:-financial_assistant}
      POSTGRES_USER: ${DB_USER:-financial}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-financial}
    ports:
      - "${DB_EXPOSE_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-financial} -d ${DB_NAME:-financial_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${DB_USER:-financial}:${DB_PASSWORD:-financial}@db:5432/${DB_NAME:-financial_assistant}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "${APP_EXPOSE_PORT:-8010}:8000"
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
