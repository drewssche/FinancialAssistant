<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Финансовый Ассистент</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <section class="login-card">
        <h1>Финансовый Ассистент</h1>
        <p>Войдите, чтобы продолжить работу.</p>

        <div class="login-actions">
          <button id="telegramLoginBtn" class="btn btn-primary">Войти через Telegram</button>
        </div>
        <div id="telegramBrowserLoginWrap" class="telegram-browser-login hidden">
          <div id="telegramBrowserLogin" class="telegram-browser-login-widget"></div>
        </div>
        <div id="loginTelegramHint" class="login-alert is-info hidden" role="status" aria-live="polite"></div>
        <div id="loginAlert" class="login-alert hidden" role="status" aria-live="polite"></div>
      </section>
    </div>

    <div id="appShellRoot"></div>

    <div id="modalRoot"></div>

    <div id="toastArea" class="toast-area"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/js/app-manifest.js"></script>
    <script src="/static/js/app-bootstrap.js"></script>
  </body>
</html>
