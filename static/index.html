<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Финансовый Ассистент</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <section class="login-card">
        <h1>Финансовый Ассистент</h1>
        <p>Войдите, чтобы продолжить работу.</p>

        <div class="input-row">
          <label class="field">
            <span>Имя</span>
            <input id="firstName" type="text" placeholder="Dev" value="Dev" />
          </label>
          <label class="field">
            <span>Логин</span>
            <input id="username" type="text" placeholder="dev_user" value="dev_user" />
          </label>
        </div>

        <div class="login-actions">
          <button id="devLoginBtn" class="btn btn-primary">Войти</button>
        </div>
        <div id="loginAlert" class="login-alert hidden" role="status" aria-live="polite"></div>
      </section>
    </div>

    <div id="appShellRoot"></div>

    <div id="modalRoot"></div>

    <div id="toastArea" class="toast-area"></div>

    <script src="/static/js/templates/shell.js"></script>
    <script src="/static/js/templates/modals.js"></script>
    <script src="/static/js/app-templates.js"></script>
    <script src="/static/js/app-core.js"></script>
    <script src="/static/js/app-core-utils.js"></script>
    <script src="/static/js/app-core-actions.js"></script>
    <script src="/static/js/app-renderers.js"></script>
    <script src="/static/js/app-categories-ui.js"></script>
    <script src="/static/js/app-categories-icon-ui.js"></script>
    <script src="/static/js/app-categories-table-ui.js"></script>
    <script src="/static/js/app-categories-data.js"></script>
    <script src="/static/js/app-categories.js"></script>
    <script src="/static/js/app-section-ui.js"></script>
    <script src="/static/js/app-features-operation-modal-preview.js"></script>
    <script src="/static/js/app-features-operation-modal.js"></script>
    <script src="/static/js/app-features-dashboard.js"></script>
    <script src="/static/js/app-features-debts-render.js"></script>
    <script src="/static/js/app-features-debts.js"></script>
    <script src="/static/js/app-features-session.js"></script>
    <script src="/static/js/app-features.js"></script>
    <script src="/static/js/app-bulk-ui.js"></script>
    <script src="/static/js/app-bulk-bindings-operations.js"></script>
    <script src="/static/js/app-bulk-bindings-categories.js"></script>
    <script src="/static/js/app-bulk-bindings.js"></script>
    <script src="/static/js/app-bulk.js"></script>
    <script src="/static/js/app-init-core.js"></script>
    <script src="/static/js/app-init-features-debts.js"></script>
    <script src="/static/js/app-init-features-pickers.js"></script>
    <script src="/static/js/app-init-features.js"></script>
    <script src="/static/js/app-init-startup.js"></script>
    <script src="/static/js/app-init.js"></script>
  </body>
</html>
