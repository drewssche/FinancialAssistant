<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <section class="login-card">
        <h1>Financial Assistant</h1>
        <p>Локальный вход для проверки интерфейса и API.</p>

        <div class="input-row">
          <label class="field">
            <span>First Name</span>
            <input id="firstName" type="text" placeholder="Dev" value="Dev" />
          </label>
          <label class="field">
            <span>Username</span>
            <input id="username" type="text" placeholder="dev_user" value="dev_user" />
          </label>
        </div>

        <div class="login-actions">
          <button id="devLoginBtn" class="btn btn-primary">Войти (Dev)</button>
        </div>

        <pre id="loginOutput" class="status-box">Готово к входу.</pre>
      </section>
    </div>

    <div id="appShell" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">FA</div>

        <nav class="nav">
          <button class="nav-btn active">Дашборд</button>
          <button class="nav-btn">Операции</button>
          <button class="nav-btn">Категории</button>
          <button class="nav-btn">Настройки</button>
        </nav>

        <div class="user-area">
          <button id="userMenuToggle" class="user-block" type="button">
            <div class="avatar" id="userAvatar">D</div>
            <div class="meta">
              <div id="userName">User</div>
              <div id="userHandle">@user</div>
            </div>
            <div class="chevron">▾</div>
          </button>

          <div id="userMenu" class="user-menu hidden">
            <button id="openSettingsBtn" class="menu-item" type="button">Настройки</button>
            <button id="logoutBtn" class="menu-item danger" type="button">Выйти</button>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h2>Рабочая область</h2>
            <p class="subtitle">Доходы, расходы и быстрый контроль баланса</p>
          </div>

          <div class="top-actions">
            <div class="segmented" id="periodTabs" role="tablist" aria-label="Период дашборда">
              <button class="segmented-btn active" data-period="30d" type="button">30 дней</button>
              <button class="segmented-btn" data-period="month" type="button">Месяц</button>
            </div>

            <div class="cta-row">
              <button id="addOperationCta" class="btn btn-cta" type="button">+ Добавить операцию</button>
              <button id="batchOperationCta" class="btn btn-cta-secondary" type="button" disabled>
                + Массовое добавление (Скоро)
              </button>
            </div>
          </div>
        </header>

        <section class="kpi-grid">
          <article class="kpi-card">
            <h3>Доход</h3>
            <p id="incomeTotal">0.00</p>
          </article>
          <article class="kpi-card">
            <h3>Расход</h3>
            <p id="expenseTotal">0.00</p>
          </article>
          <article class="kpi-card">
            <h3>Баланс</h3>
            <p id="balanceTotal">0.00</p>
          </article>
        </section>

        <section class="panel">
          <div class="panel-head row between">
            <h3>Операции</h3>
            <div class="toolbar">
              <div class="segmented" id="kindFilters" role="tablist" aria-label="Фильтр по типу">
                <button class="segmented-btn active" data-kind="" type="button">Все</button>
                <button class="segmented-btn" data-kind="expense" type="button">Расход</button>
                <button class="segmented-btn" data-kind="income" type="button">Доход</button>
              </div>
              <input id="filterQ" type="text" placeholder="Поиск по заметке" />
              <button id="applyFilters" class="btn btn-secondary" type="button">Применить</button>
              <button id="refreshBtn" class="btn btn-secondary" type="button">Обновить</button>
            </div>
          </div>

          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Тип</th>
                  <th>Сумма</th>
                  <th>Комментарий</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="operationsBody"></tbody>
            </table>
          </div>

          <div class="pagination">
            <button id="prevPageBtn" class="btn btn-secondary" type="button">Назад</button>
            <span id="pageInfo">Страница 1</span>
            <button id="nextPageBtn" class="btn btn-secondary" type="button">Вперёд</button>
          </div>

          <pre id="appOutput" class="status-box">Готово.</pre>
        </section>
      </main>
    </div>

    <div id="createModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="createTitle">
      <div class="modal-card">
        <div class="panel-head row between">
          <h3 id="createTitle">Новая операция</h3>
          <button id="closeCreateModalBtn" class="btn btn-secondary" type="button">Закрыть</button>
        </div>

        <form id="createOperationForm" class="form-grid modal-grid">
          <div class="segmented" id="createKindSwitch" aria-label="Тип операции">
            <button class="segmented-btn active" data-kind="expense" type="button">Расход</button>
            <button class="segmented-btn" data-kind="income" type="button">Доход</button>
          </div>
          <input id="opKind" type="hidden" value="expense" />
          <input id="opAmount" type="number" step="0.01" placeholder="Сумма" required />
          <input id="opDate" type="date" required />
          <input id="opNote" type="text" placeholder="Комментарий" />
          <button class="btn btn-primary" type="submit">Сохранить</button>
        </form>
      </div>
    </div>

    <div id="editModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <div class="modal-card">
        <div class="panel-head row between">
          <h3 id="editTitle">Редактировать операцию</h3>
          <button id="closeEditModalBtn" class="btn btn-secondary" type="button">Закрыть</button>
        </div>

        <form id="editOperationForm" class="form-grid modal-grid">
          <div class="segmented" id="editKindSwitch" aria-label="Тип операции">
            <button class="segmented-btn active" data-kind="expense" type="button">Расход</button>
            <button class="segmented-btn" data-kind="income" type="button">Доход</button>
          </div>
          <input id="editKind" type="hidden" value="expense" />
          <input id="editAmount" type="number" step="0.01" required />
          <input id="editDate" type="date" required />
          <input id="editNote" type="text" placeholder="Комментарий" />
          <button class="btn btn-primary" type="submit">Сохранить</button>
        </form>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
